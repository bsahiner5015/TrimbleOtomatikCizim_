name: Windows EXE Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Python 3.11 kur
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Bagimliliklar
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: EXE derle
      run: |
        pyinstaller --onefile --windowed --name TrimbleOtomatikCizim ^
          --hidden-import=laspy.lasappender ^
          --hidden-import=laspy.laswriter ^
          --hidden-import=laspy.reading ^
          --hidden-import=cv2 ^
          --collect-all laspy ^
          --collect-all lazrs ^
          main.py

    - name: Tam klasoru hazirla
      run: |
        mkdir TrimbleOtomatikCizim_DIST
        copy dist\TrimbleOtomatikCizim.exe TrimbleOtomatikCizim_DIST\
        copy robot_config.json TrimbleOtomatikCizim_DIST\
        copy KULLANIM.txt TrimbleOtomatikCizim_DIST\
        copy BASLAT.bat TrimbleOtomatikCizim_DIST\
        copy robot_calistir.bat TrimbleOtomatikCizim_DIST\
        mkdir TrimbleOtomatikCizim_DIST\giris
        mkdir TrimbleOtomatikCizim_DIST\cikti
        mkdir TrimbleOtomatikCizim_DIST\islenmis

    - name: Artifact yukle
      uses: actions/upload-artifact@v4
      with:
        name: TrimbleOtomatikCizim_Windows
        path: TrimbleOtomatikCizim_DIST/
        retention-days: 30
